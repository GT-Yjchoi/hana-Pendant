# M1S Pendant 용 weston 설정 (kiosk + 800x1280 portrait DSI -> landscape)
# pendant.service 가 --config=$PROJECT_DIR/weston.ini 로 호출.

[core]
# kiosk-shell: 풀스크린 단일 클라이언트, 데코레이션/패널 없음
shell=kiosk-shell.so
# 자동 idle 끄기 (화면 꺼지지 않게)
idle-time=0
# X11 호환은 안 씀
xwayland=false

[output]
# DSI-1: VU8s 패널. 하드웨어는 portrait 800x1280.
# rotate-270 = 90 도 counter-clockwise -> 1280x800 landscape 로 보임.
# Pi 의 cmdline rotate=-90 (= CCW 90도) 와 동일한 방향.
#
# 화면이 거꾸로/잘못된 방향이면 아래로 교체:
#   rotate-90   (90도 CW)
#   rotate-180  (180도)
#   normal      (회전 없이 portrait 그대로)
name=DSI-1
transform=rotate-270
mode=preferred

[shell]
# kiosk-shell 은 패널/wallpaper 없음.
locking=false
